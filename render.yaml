services:
  - type: web
    name: resource-hub-intake
    env: python
    rootDir: code
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.app
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_CHANNEL_IDS
        sync: false
      - key: SLACK_OPS_CHANNEL_ID
        sync: false
      - key: LITELLM_PROVIDER
        sync: false
      - key: LITELLM_MODEL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_PRODUCTION_DB_ID
        sync: false
      - key: NOTION_SHADOW_DB_ID
        sync: false
